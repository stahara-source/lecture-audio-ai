<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>講義音声ノートAI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* ここにデザインを直接書きました！これで「壊れる」ことはありません */
        :root { --primary-color: #4a90e2; --bg-color: #f8f9fa; --card-bg: #ffffff; --text-color: #333; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="file"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; margin-bottom: 15px; }
        button { width: 100%; padding: 14px; background-color: var(--primary-color); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .loading { display: none; text-align: center; margin: 20px 0; color: var(--primary-color); }
        .result-area { display: none; }
        .result-card { position: relative; background: #fff; border-left: 6px solid var(--primary-color); padding: 20px; margin-top: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        .copy-btn { position: absolute; top: 15px; right: 15px; background: #f0f0f0; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        #settings-btn { background: none; color: #666; font-size: 24px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-file-audio"></i> 講義音声ノートAI</h1>
            <button id="settings-btn" onclick="toggleSettings()"><i class="fas fa-cog"></i></button>
        </header>
        <div id="settings-card" class="card" style="display: none;">
            <label>Gemini API Key</label>
            <input type="text" id="api-key" placeholder="APIキーを入力">
            <button onclick="saveApiKey()">キーを保存</button>
        </div>
        <div class="card">
            <label>講義名</label>
            <input type="text" id="lecture-name" placeholder="例：経済学 第5回">
            <label>音声ファイル</label>
            <input type="file" id="audio-file" accept="audio/*">
            <button id="run-btn" onclick="processAudio()">解析を開始する</button>
        </div>
        <div id="loading" class="loading"><i class="fas fa-spinner fa-spin"></i> 解析中...</div>
        <div id="result-area" class="result-area">
            <h2 id="display-title" style="text-align: center;"></h2>
            <div class="result-card"><h3>3行要約</h3><div id="summary-result"></div><button class="copy-btn" onclick="copyText('summary-result')">コピー</button></div>
            <div class="result-card"><h3>重要ポイント</h3><div id="points-result"></div><button class="copy-btn" onclick="copyText('points-result')">コピー</button></div>
            <div class="result-card"><h3>文字起こし全文</h3><div id="transcription-result"></div><button class="copy-btn" onclick="copyText('transcription-result')">コピー</button></div>
        </div>
    </div>
    <script>
        function toggleSettings() { const card = document.getElementById('settings-card'); card.style.display = card.style.display === 'none' ? 'block' : 'none'; }
        function saveApiKey() { localStorage.setItem('gemini_api_key', document.getElementById('api-key').value); alert('保存しました'); toggleSettings(); }
        window.onload = () => { document.getElementById('api-key').value = localStorage.getItem('gemini_api_key') || ''; };
        function copyText(id) { navigator.clipboard.writeText(document.getElementById(id).innerText).then(() => alert('コピーしました！')); }
        async function processAudio() {
            const apiKey = localStorage.getItem('gemini_api_key');
            const fileInput = document.getElementById('audio-file');
            if (!apiKey || fileInput.files.length === 0) return alert('設定を確認してください');
            const file = fileInput.files[0];
            const runBtn = document.getElementById('run-btn');
            const loading = document.getElementById('loading');
            const resultArea = document.getElementById('result-area');
            runBtn.disabled = true; loading.style.display = 'block'; resultArea.style.display = 'none';
            try {
                const base64Data = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result.split(',')[1]);
                    reader.readAsDataURL(file);
                });
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [
                        { text: "解析し、【要約】、【ポイント】、【全文】に分けて出力して。" },
                        { inline_data: { mime_type: file.type, data: base64Data } }
                    ]}]})
                });
                const data = await response.json();
                const output = data.candidates[0].content.parts[0].text;
                document.getElementById('display-title').innerText = document.getElementById('lecture-name').value || '解析結果';
                document.getElementById('summary-result').innerText = output.split('【要約】')[1]?.split('【ポイント】')[0] || "抽出失敗";
                document.getElementById('points-result').innerText = output.split('【ポイント】')[1]?.split('【全文】')[0] || "抽出失敗";
                document.getElementById('transcription-result').innerText = output.split('【全文】')[1] || output;
                resultArea.style.display = 'block';
            } catch (e) { alert('エラーが発生しました'); } finally { runBtn.disabled = false; loading.style.display = 'none'; }
        }
    </script>
</body>
</html>
