<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>講義音声ノートAI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            background: #fff;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            margin-top: 10px;
        }

        button:hover { background-color: #357abd; }
        button:active { transform: scale(0.98); }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
            color: var(--primary-color);
            font-weight: bold;
        }

        .result-area { display: none; }

        .result-card {
            position: relative;
            background: #fff;
            border-left: 6px solid var(--primary-color);
            padding: 20px;
            margin-top: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        .result-card h3 {
            margin-top: 0;
            font-size: 18px;
            color: var(--primary-color);
        }

        .copy-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #f0f0f0;
            border: none;
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 6px;
            width: auto;
            color: #555;
            cursor: pointer;
        }

        .copy-btn:hover { background: #e0e0e0; }

        #settings-btn {
            background: none;
            color: #666;
            width: auto;
            font-size: 24px;
            border: none;
            padding: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-file-audio"></i> 講義音声ノートAI</h1>
            <button id="settings-btn" onclick="toggleSettings()"><i class="fas fa-cog"></i></button>
        </header>

        <div id="settings-card" class="card" style="display: none;">
            <label><i class="fas fa-key"></i> Gemini API Key</label>
            <input type="text" id="api-key" placeholder="AI Studioで取得したキーを入力">
            <button onclick="saveApiKey()">キーを保存</button>
        </div>

        <div class="card">
            <div class="form-group">
                <label>講義名</label>
                <input type="text" id="lecture-name" placeholder="例：経済学 第5回">
            </div>
            <div class="form-group">
                <label>音声ファイル (MP3/WAVなど)</label>
                <input type="file" id="audio-file" accept="audio/*">
            </div>
            <button id="run-btn" onclick="processAudio()">解析を開始する</button>
        </div>

        <div id="loading" class="loading">
            <i class="fas fa-spinner fa-spin"></i> Geminiが解析中...（数十秒かかります）
        </div>

        <div id="result-area" class="result-area">
            <h2 id="display-title" style="text-align: center; margin-bottom: 25px;"></h2>

            <div class="result-card">
                <h3><i class="fas fa-list-ul"></i> 3行要約</h3>
                <div id="summary-result"></div>
                <button class="copy-btn" onclick="copyText('summary-result')">コピー</button>
            </div>

            <div class="result-card">
                <h3><i class="fas fa-check-square"></i> 重要ポイント</h3>
                <div id="points-result"></div>
                <button class="copy-btn" onclick="copyText('points-result')">コピー</button>
            </div>

            <div class="result-card">
                <h3><i class="fas fa-align-left"></i> 文字起こし全文</h3>
                <div id="transcription-result"></div>
                <button class="copy-btn" onclick="copyText('transcription-result')">コピー</button>
            </div>
        </div>
    </div>

    <script>
        function toggleSettings() {
            const card = document.getElementById('settings-card');
            card.style.display = card.style.display === 'none' ? 'block' : 'none';
        }

        function saveApiKey() {
            const key = document.getElementById('api-key').value;
            localStorage.setItem('gemini_api_key', key);
            alert('APIキーを保存しました');
            toggleSettings();
        }

        window.onload = () => {
            document.getElementById('api-key').value = localStorage.getItem('gemini_api_key') || '';
        };

        function copyText(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text).then(() => alert('コピーしました！'));
        }

        async function processAudio() {
            const apiKey = localStorage.getItem('gemini_api_key');
            const fileInput = document.getElementById('audio-file');
            const lectureName = document.getElementById('lecture-name').value || '無題の講義';

            if (!apiKey) return alert('先に設定（⚙️）からAPIキーを入力してください');
            if (fileInput.files.length === 0) return alert('音声ファイルを選択してください');

            const file = fileInput.files[0];
            const runBtn = document.getElementById('run-btn');
            const loading = document.getElementById('loading');
            const resultArea = document.getElementById('result-area');

            runBtn.disabled = true;
            loading.style.display = 'block';
            resultArea.style.display = 'none';

            try {
                const base64Data = await btoaAsync(file);
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "渡された音声を解析し、以下の3つのセクションに分けて日本語で出力してください。セクションの区切りには必ず以下の見出しを入れてください。\n\n【要約】\n(ここに3行程度の要約)\n\n【ポイント】\n(ここに箇条書きの要点)\n\n【全文】\n(ここに文字起こし全文)" },
                                { inline_data: { mime_type: file.type, data: base64Data } }
                            ]
                        }]
                    })
                });

                const data = await response.json();
                const output = data.candidates[0].content.parts[0].text;

                document.getElementById('display-title').innerText = lectureName;

                // テキスト分割処理
                const summaryPart = output.split('【要約】')[1]?.split('【ポイント】')[0] || "要約の抽出に失敗しました";
                const pointsPart = output.split('【ポイント】')[1]?.split('【全文】')[0] || "ポイントの抽出に失敗しました";
                const fullTextPart = output.split('【全文】')[1] || output;

                document.getElementById('summary-result').innerText = summaryPart.trim();
                document.getElementById('points-result').innerText = pointsPart.trim();
                document.getElementById('transcription-result').innerText = fullTextPart.trim();

                resultArea.style.display = 'block';
            } catch (error) {
                console.error(error);
                alert('エラーが発生しました。コンソールログを確認してください。');
            } finally {
                runBtn.disabled = false;
                loading.style.display = 'none';
            }
        }

        function btoaAsync(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = error => reject(error);
                reader.readAsDataURL(file);
            });
        }
    </script>
</body>
</html>
